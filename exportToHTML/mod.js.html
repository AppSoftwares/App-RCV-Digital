<pre><span class="s0">'use strict'</span><span class="s1">;</span>

<span class="s2">var </span><span class="s1">$floor = require(</span><span class="s0">'./floor'</span><span class="s1">);</span>

<span class="s3">/** @type {import('./mod')} */</span>
<span class="s1">module.exports = </span><span class="s2">function </span><span class="s1">mod(number, modulo) {</span>
	<span class="s2">var </span><span class="s1">remain = number % modulo;</span>
	<span class="s2">return </span><span class="s1">$floor(remain &gt;= </span><span class="s4">0 </span><span class="s1">? remain : remain + modulo);</span>
<span class="s1">};</span>
