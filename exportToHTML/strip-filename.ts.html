<pre><span class="s0">/**</span>
 <span class="s1">* Removes everything after the last &quot;/&quot;, but leaves the slash. 
 </span><span class="s0">*/</span>
<span class="s3">export default function </span><span class="s4">stripFilename</span><span class="s0">(path: string | undefined | null): string {</span>
  <span class="s3">if </span><span class="s2">(</span><span class="s0">!path</span><span class="s2">) </span><span class="s3">return </span><span class="s0">'';</span>
  <span class="s3">const </span><span class="s0">index = path.</span><span class="s4">lastIndexOf</span><span class="s2">(</span><span class="s0">'</span><span class="s5">/</span><span class="s0">'</span><span class="s2">)</span><span class="s0">;</span>
  <span class="s3">return </span><span class="s0">path.</span><span class="s4">slice</span><span class="s2">(</span><span class="s6">0</span><span class="s0">, index + </span><span class="s6">1</span><span class="s2">)</span><span class="s0">;</span>
<span class="s0">}</span>
